trigger:
  branches:
    include:
      - main
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '8.0.x'
  runtimeIdentifier: 'win-x64'
  projectFile: 'HVTools/HVTools.csproj'
  publishDir: '$(Build.ArtifactStagingDirectory)\publish'
  packageRoot: '$(Build.ArtifactStagingDirectory)\package\ClusterIQ'
  gitHubServiceConnection: 'ClusterIQ-GitHub'
  gitHubRepository: 'jaycalderwood/ClusterIQ'
  packageBaseName: 'ClusterIQ'

steps:
- checkout: self
  persistCredentials: true

- task: UseDotNet@2
  displayName: 'Install .NET SDK $(dotnetSdkVersion)'
  inputs:
    packageType: 'sdk'
    version: '$(dotnetSdkVersion)'

- task: PowerShell@2
  name: SetVersion
  displayName: 'Resolve version and tag metadata'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'

      $baseVersion = '1.0.1'
      $branch = "$(Build.SourceBranch)"
      $branchName = "$(Build.SourceBranchName)"

      $packageVersion = $baseVersion
      $releaseTag = ''
      $isTagRelease = 'false'

      if ($branch -like 'refs/tags/v*') {
        $releaseTag = $branchName
        $packageVersion = $branchName.TrimStart('v')
        $isTagRelease = 'true'
      }
      else {
        $packageVersion = "$baseVersion-ci.$(Build.BuildId)"
      }

      $assemblyVersion = "$baseVersion.0"
      $fileVersion = "$baseVersion.0"

      Write-Host "##vso[task.setvariable variable=PackageVersion]$packageVersion"
      Write-Host "##vso[task.setvariable variable=AssemblyVersion]$assemblyVersion"
      Write-Host "##vso[task.setvariable variable=FileVersion]$fileVersion"
      Write-Host "##vso[task.setvariable variable=ReleaseTag]$releaseTag"
      Write-Host "##vso[task.setvariable variable=IsTagRelease]$isTagRelease"

- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: '$(projectFile)'

- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: '$(projectFile)'
    arguments: >
      --configuration $(buildConfiguration)
      --no-restore
      /p:Version=$(PackageVersion)
      /p:AssemblyVersion=$(AssemblyVersion)
      /p:FileVersion=$(FileVersion)
      /p:InformationalVersion=$(PackageVersion)

- task: DotNetCoreCLI@2
  displayName: 'Publish self-contained single-file win-x64'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '$(projectFile)'
    arguments: >
      --configuration $(buildConfiguration)
      --runtime $(runtimeIdentifier)
      --self-contained true
      -o "$(publishDir)"
      /p:PublishSingleFile=true
      /p:IncludeNativeLibrariesForSelfExtract=true
      /p:PublishTrimmed=false
      /p:Version=$(PackageVersion)
      /p:AssemblyVersion=$(AssemblyVersion)
      /p:FileVersion=$(FileVersion)
      /p:InformationalVersion=$(PackageVersion)
    zipAfterPublish: false
    modifyOutputPath: false

- task: PowerShell@2
  displayName: 'Generate release notes'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'
      $notesPath = "$(Build.ArtifactStagingDirectory)\release-notes.md"

      $lines = @(
        "# ClusterIQ $(PackageVersion)"
        ""
        "## Release Summary"
        "- Self-contained single-file win-x64 build"
        "- Built by Azure DevOps"
        "- Intended for GitHub release distribution and in-app updater consumption"
        ""
        "## Notes"
        "- Update this section later if you want custom notes per release."
      )

      $lines | Set-Content $notesPath -Encoding UTF8

- task: PowerShell@2
  displayName: 'Package EXE, ZIP, and hashes'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'

      New-Item -ItemType Directory -Force -Path "$(packageRoot)" | Out-Null
      Copy-Item -Path "$(publishDir)\*" -Destination "$(packageRoot)" -Recurse -Force

      $exe = Get-ChildItem "$(publishDir)" -Filter "*.exe" | Select-Object -First 1
      if (-not $exe) { throw "No EXE found in publish output." }

      $exeTarget = Join-Path "$(Build.ArtifactStagingDirectory)" ("$(packageBaseName)_" + "$(PackageVersion)" + "_win-x64.exe")
      Copy-Item $exe.FullName $exeTarget -Force

      $zipTarget = Join-Path "$(Build.ArtifactStagingDirectory)" ("$(packageBaseName)_" + "$(PackageVersion)" + "_win-x64.zip")
      if (Test-Path $zipTarget) { Remove-Item $zipTarget -Force }
      Compress-Archive -Path "$(packageRoot)\*" -DestinationPath $zipTarget -Force

      $hashExe = (Get-FileHash $exeTarget -Algorithm SHA256).Hash
      $hashZip = (Get-FileHash $zipTarget -Algorithm SHA256).Hash

      @(
        "PackageVersion=$(PackageVersion)"
        "EXE=$([IO.Path]::GetFileName($exeTarget))"
        "EXE_SHA256=$hashExe"
        "ZIP=$([IO.Path]::GetFileName($zipTarget))"
        "ZIP_SHA256=$hashZip"
      ) | Set-Content (Join-Path "$(Build.ArtifactStagingDirectory)" "release-metadata.txt") -Encoding UTF8

- task: PublishBuildArtifacts@1
  displayName: 'Publish build artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'

- task: GitHubRelease@1
  displayName: 'Create GitHub release and upload assets'
  condition: and(succeeded(), eq(variables['IsTagRelease'], 'true'))
  inputs:
    gitHubConnection: '$(gitHubServiceConnection)'
    repositoryName: '$(gitHubRepository)'
    action: 'create'
    target: '$(Build.SourceVersion)'
    tagSource: 'userSpecifiedTag'
    tag: '$(ReleaseTag)'
    title: 'ClusterIQ $(PackageVersion)'
    releaseNotesSource: 'filePath'
    releaseNotesFilePath: '$(Build.ArtifactStagingDirectory)\release-notes.md'
    assets: |
      $(Build.ArtifactStagingDirectory)\ClusterIQ_$(PackageVersion)_win-x64.exe
      $(Build.ArtifactStagingDirectory)\ClusterIQ_$(PackageVersion)_win-x64.zip
      $(Build.ArtifactStagingDirectory)\release-metadata.txt
    isDraft: false
    isPreRelease: false
    makeLatest: true
    addChangeLog: true
