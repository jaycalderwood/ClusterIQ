name: Build ClusterIQ

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\HVTools\HVTools.csproj

      - name: Build
        run: dotnet build .\HVTools\HVTools.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish .\HVTools\HVTools.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClusterIQ-publish
          path: .\artifacts\publish
